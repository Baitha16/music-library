<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Library</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tone@14.9.19/build/Tone.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div>
          <h1>♫ <span>Music</span> Library</h1>
          <div class="subtitle">Autoplayer Virtual Piano by EZIO</div>
        </div>
        <button id="tutorial-btn" class="btn btn-tutorial">Tutorial</button>
        <button id="license-btn" class="btn btn-outline" style="font-size:14px">🔑 License</button>
        <a href="https://discord.gg/AVnB5QShz4" target="_blank" class="btn" style="background:#e67e22;color:#fff;font-size:14px">Req Songs</a>
        <a href="https://discord.gg/tVj2sHwG3Z" target="_blank" class="btn btn-discord">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.054C1.483 10.34.838 16.148.994 21.88a.085.085 0 0 0 .032.06 20.083 20.083 0 0 0 6.038 3.055.08.08 0 0 0 .087-.027c.465-.636.88-1.311 1.237-2.017a.078.078 0 0 0-.043-.107 13.252 13.252 0 0 1-1.889-.9.076.076 0 0 1-.019-.125c.127-.095.253-.194.374-.293a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.099.247.198.374.293a.076.076 0 0 1-.018.125c-.597.356-1.219.658-1.889.9a.078.078 0 0 0-.042.107c.357.706.772 1.38 1.237 2.018a.08.08 0 0 0 .087.027 20.03 20.03 0 0 0 6.037-3.055.081.081 0 0 0 .032-.06c.19-6.406-.932-12.173-3.975-17.456a.063.063 0 0 0-.027-.054zM8.02 18.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.947 2.418-2.157 2.418z"/></svg>
          Discord
        </a>
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <button id="theme-toggle" class="btn-icon" title="Toggle theme">🌙</button>
        <a href="/admin.html" class="btn-admin-link" title="Admin">⚙</a>
      </div>
    </header>

    <input type="text" id="search-input" class="search-input" placeholder="Search files...">

    <div class="tabs" id="category-tabs"></div>

    <div id="file-list">
      <div class="empty-state" id="empty-state">
        <div class="icon">🎵</div>
        <h3>No files yet</h3>
        <p>Library is empty. Check back later.</p>
      </div>

      <div class="file-grid" id="file-grid"></div>
    </div>
  </div>

  <div class="overlay" id="tutorial-overlay">
    <div class="modal" style="max-width:500px">
      <h2 id="tutorial-title">Tutorial</h2>
      <div id="tutorial-content" style="white-space:pre-wrap;color:#aaa;font-size:14px;line-height:1.6;margin-bottom:16px"></div>
      <div class="modal-actions">
        <button class="btn btn-primary btn-sm" id="tutorial-close">Close</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="license-overlay">
    <div class="modal" style="max-width:420px">
      <h2>🔑 License Key</h2>
      <p style="color:var(--text-muted);font-size:13px;margin-bottom:12px">Enter your license key to access downloads.</p>
      <input type="text" id="license-input" placeholder="XXXX-XXXX-XXXX-XXXX" style="width:100%;padding:12px 16px;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:16px;text-align:center;font-family:monospace;outline:none;margin-bottom:12px;letter-spacing:2px;text-transform:uppercase">
      <div class="error" id="license-error" style="display:none;color:#e74c3c;font-size:13px;margin-bottom:12px"></div>
      <div id="license-status" style="display:none;margin-bottom:12px;padding:10px;border-radius:8px;font-size:14px;text-align:center"></div>
      <div class="modal-actions">
        <button class="btn btn-outline btn-sm" id="license-cancel">Cancel</button>
        <button class="btn btn-primary btn-sm" id="license-submit">Verify</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="player-overlay">
    <div class="modal" style="max-width:500px">
      <h2 id="player-title">▶ Playing</h2>
      <div style="text-align:center;margin-bottom:16px">
        <p id="player-status" style="color:var(--text-muted);font-size:14px">Loading…</p>
      </div>
      <div style="display:flex;gap:8px;justify-content:center;margin-bottom:16px">
        <button class="btn btn-primary" id="player-play-btn">▶ Play</button>
        <button class="btn btn-outline" id="player-pause-btn">⏸ Pause</button>
        <button class="btn btn-outline" id="player-stop-btn">⏹ Stop</button>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline btn-sm" id="player-close">Close</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="sheet-overlay">
    <div class="modal" style="max-width:600px">
      <h2 id="sheet-title">Sheets</h2>
      <pre id="sheet-content" style="background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:16px;font-size:13px;line-height:1.5;overflow:auto;max-height:60vh;white-space:pre-wrap;word-break:break-word;color:var(--text);margin-bottom:16px"></pre>
      <div class="modal-actions">
        <button class="btn btn-outline btn-sm" id="sheet-dl-btn">⬇ Download</button>
        <button class="btn btn-primary btn-sm" id="sheet-close">Close</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="report-overlay">
    <div class="modal" style="max-width:500px">
      <h2>⚠ Report File</h2>
      <p style="color:var(--text);font-size:14px;margin-bottom:8px" id="report-filename"></p>
      <select id="report-reason" style="width:100%;padding:10px 12px;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:12px;outline:none">
        <option value="">Select a reason…</option>
        <option value="bad-quality">Bad quality MIDI</option>
        <option value="wrong-category">Wrong category</option>
        <option value="broken">Broken / doesn't play</option>
        <option value="other">Other</option>
      </select>
      <textarea id="report-comment" placeholder="Optional comment…" style="width:100%;padding:10px 12px;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;resize:vertical;min-height:60px;margin-bottom:16px;box-sizing:border-box"></textarea>
      <div class="modal-actions">
        <button class="btn btn-danger btn-sm" id="report-submit">Submit Report</button>
        <button class="btn btn-outline btn-sm" id="report-close">Cancel</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let categories = ['All'];
    let fileCategories = {};

    const themeToggle = document.getElementById('theme-toggle');

    function initTheme() {
      const isLight = localStorage.getItem('theme') === 'light';
      document.body.classList.toggle('light-mode', isLight);
      themeToggle.textContent = isLight ? '☀️' : '🌙';
    }
    themeToggle.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light-mode');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      themeToggle.textContent = isLight ? '☀️' : '🌙';
    });
    initTheme();

    const fileGrid = document.getElementById('file-grid');
    const emptyState = document.getElementById('empty-state');
    const tabs = document.getElementById('category-tabs');
    const tutorialBtn = document.getElementById('tutorial-btn');
    const tutorialOverlay = document.getElementById('tutorial-overlay');
    const tutorialTitle = document.getElementById('tutorial-title');
    const tutorialContent = document.getElementById('tutorial-content');
    const tutorialClose = document.getElementById('tutorial-close');

    let displayNames = {};
    let licenseInfo = null;
    let canDownload = false;
    let playerSynth = null;
    let playerPart = null;
    let playerMidiData = null;

    function loadLicense() {
      try {
        const saved = localStorage.getItem('license');
        if (saved) {
          const parsed = JSON.parse(saved);
          licenseInfo = parsed;
          canDownload = parsed.canDownload || false;
          return true;
        }
      } catch {}
      return false;
    }

    function saveLicense(info) {
      licenseInfo = info;
      canDownload = info.canDownload || false;
      localStorage.setItem('license', JSON.stringify(info));
      renderFiles();
      updateLicenseBtn();
    }

    function clearLicense() {
      licenseInfo = null;
      canDownload = false;
      localStorage.removeItem('license');
      renderFiles();
      updateLicenseBtn();
    }

    function updateLicenseBtn() {
      const btn = document.getElementById('license-btn');
      if (licenseInfo) {
        const icons = { trial: '🔑', weekly: '⭐', monthly: '⭐', yearly: '💎', lifetime: '💎' };
        btn.textContent = (icons[licenseInfo.type] || '🔑') + ' ' + licenseInfo.type;
        btn.style.borderColor = licenseInfo.canDownload ? '#22c55e' : '#e67e22';
      } else {
        btn.textContent = '🔑 License';
        btn.style.borderColor = '';
      }
    }

    loadLicense();

    function cleanName(name) {
      if (displayNames[name]) return displayNames[name].replace(/\.(zip|mid|midi|txt)$/i, '');
      return name.replace(/\.(zip|mid|midi|txt)$/i, '').replace(/_/g, ' ').replace(/\s+/g, ' ').trim();
    }

    function fileIcon(name) {
      if (name.match(/\.(mid|midi)$/i)) return '🎹';
      if (name.match(/\.txt$/i)) return '📄';
      return '📦';
    }

    function formatSize(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function getCategory(filename) {
      return fileCategories[filename] || '';
    }

    async function loadConfig() {
      try {
        const res = await fetch('/api/config');
        const config = await res.json();
        categories = ['All', ...(config.categories || [])];
        fileCategories = config.fileCategories || {};
        displayNames = config.displayNames || {};
        if (config.tutorial) {
          tutorialTitle.textContent = config.tutorial.title || 'Tutorial';
          tutorialContent.textContent = config.tutorial.content || '';
        }
        renderTabs();
        renderFiles();
      } catch (err) {
        console.error('Failed to load config');
      }
    }

    function renderTabs() {
      tabs.innerHTML = categories.map(c => `
        <button class="tab ${c === currentCategory ? 'active' : ''}" data-category="${c}" onclick="filterCategory('${c}')">${c}</button>
      `).join('');
    }

    let currentCategory = 'All';
    let searchQuery = '';

    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value.trim().toLowerCase();
      renderFiles();
    });

    function filterCategory(cat) {
      currentCategory = cat;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-category="${cat}"]`)?.classList.add('active');
      renderFiles();
    }

    async function loadFiles() {
      try {
        const res = await fetch('/api/files');
        if (!res.ok) { const e = await res.json(); throw new Error(e.detail || e.error); }
        const data = await res.json();
        window.allFiles = (data.files || []).sort((a, b) =>
          cleanName(a.name).localeCompare(cleanName(b.name), undefined, { sensitivity: 'base' })
        );
        renderFiles();
      } catch (err) {
        showToast('Failed to load files: ' + err.message, 'error');
      }
    }

    function renderFiles() {
      const files = window.allFiles || [];
      let filtered = files;
      if (currentCategory !== 'All') {
        filtered = files.filter(f => getCategory(f.name) === currentCategory);
      }
      if (searchQuery) {
        filtered = filtered.filter(f => cleanName(f.name).toLowerCase().includes(searchQuery));
      }

      if (filtered.length === 0) {
        emptyState.style.display = 'block';
        fileGrid.innerHTML = '';
        return;
      }

      emptyState.style.display = 'none';

      const groups = {};
      filtered.forEach(f => {
        const base = cleanName(f.name);
        if (!groups[base]) groups[base] = [];
        groups[base].push(f);
      });

      fileGrid.innerHTML = Object.entries(groups).map(([baseName, fGroup]) => {
        const cat = getCategory(fGroup[0].name);
        const catBadge = cat ? `<span class="cat-badge">${cat}</span>` : '';
        const midFile = fGroup.find(f => f.name.match(/\.(mid|midi)$/i));
        const txtFile = fGroup.find(f => f.name.match(/\.txt$/i));
        const zipFile = fGroup.find(f => f.name.match(/\.zip$/i));

        const dl = (file) => canDownload ? `<a href="/api/download?name=${encodeURIComponent(file.name)}" class="btn btn-outline btn-sm">⬇ Download</a>` : '';
        const browserPlay = (file) => `<button class="btn btn-primary btn-sm" onclick="playMidi('${file.name.replace(/'/g, "\\'")}')">▶ Play</button>`;
        const appPlay = (url, label) => `<a href="${url}" class="btn btn-outline btn-sm">${label}</a>`;

        let actionsHtml = '';
        if (midFile && txtFile) {
          actionsHtml = `
            ${browserPlay(midFile)}
            ${appPlay(`ezio://load?file=${encodeURIComponent(midFile.name)}&txt=${encodeURIComponent(txtFile.name)}`, 'Play on App')}
            <button class="btn btn-outline btn-sm" onclick="showSheet('${txtFile.name.replace(/'/g, "\\'")}')">📄 Sheets</button>
            ${canDownload ? `<button class="btn btn-outline btn-sm" onclick="downloadAsZip(['${midFile.name.replace(/'/g, "\\'")}','${txtFile.name.replace(/'/g, "\\'")}'],'${baseName.replace(/'/g, "\\'")}.zip')">⬇ Download</button>` : ''}
            <button class="btn btn-outline btn-sm" onclick="showReport('${baseName.replace(/'/g, "\\'")}')">⚠</button>`;
        } else if (midFile) {
          actionsHtml = `${browserPlay(midFile)}
            ${appPlay(`ezio://load?file=${encodeURIComponent(midFile.name)}`, 'Play on App')}
            ${dl(midFile)}
            <button class="btn btn-outline btn-sm" onclick="showReport('${baseName.replace(/'/g, "\\'")}')">⚠</button>`;
        } else if (txtFile) {
          actionsHtml = `${dl(txtFile)}
            <button class="btn btn-outline btn-sm" onclick="showSheet('${txtFile.name.replace(/'/g, "\\'")}')">📄 Sheets</button>
            <button class="btn btn-outline btn-sm" onclick="showReport('${baseName.replace(/'/g, "\\'")}')">⚠</button>`;
        } else if (zipFile) {
          actionsHtml = `${dl(zipFile)}
            <button class="btn btn-outline btn-sm" onclick="showReport('${baseName.replace(/'/g, "\\'")}')">⚠</button>`;
        } else {
          actionsHtml = fGroup.map(f =>
            (canDownload ? `<a href="/api/download?name=${encodeURIComponent(f.name)}" class="btn btn-outline btn-sm">⬇ ${f.name.split('.').pop()}</a>` : '')
          ).join('') + `<button class="btn btn-outline btn-sm" onclick="showReport('${baseName.replace(/'/g, "\\'")}')">⚠</button>`;
        }

        return `
          <div class="file-card">
            <div class="file-info">
                <div class="file-icon">${fileIcon(midFile?.name || txtFile?.name || zipFile?.name || fGroup[0].name)}</div>
              <div>
                <div class="file-name" title="${fGroup.map(f=>f.name).join(', ')}">${baseName}</div>
                <div class="file-meta">
                  ${catBadge}
                  ${fGroup.map(f => f.name.split('.').pop()).join(', ').toUpperCase()} &middot; ${formatDate(fGroup[0].uploadedAt)}
                </div>
              </div>
            </div>
            <div class="file-actions">
              ${actionsHtml}
            </div>
          </div>
        `
      }).join('');
    }

    async function downloadAsZip(filenames, zipName) {
      try {
        const zip = new JSZip();
        for (const name of filenames) {
          const resp = await fetch(`/api/download?name=${encodeURIComponent(name)}`);
          if (!resp.ok) { showToast(`Failed to fetch: ${name}`, 'error'); continue; }
          const blob = await resp.blob();
          zip.file(name, blob);
        }
        const blob = await zip.generateAsync({ type: 'blob' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = zipName;
        document.body.appendChild(a); a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } catch (err) {
        showToast('Failed to create ZIP', 'error');
      }
    }

    tutorialBtn.addEventListener('click', () => tutorialOverlay.classList.add('active'));
    tutorialClose.addEventListener('click', () => tutorialOverlay.classList.remove('active'));
    tutorialOverlay.addEventListener('click', (e) => {
      if (e.target === tutorialOverlay) tutorialOverlay.classList.remove('active');
    });

    // License modal
    const licenseOverlay = document.getElementById('license-overlay');
    const licenseInput = document.getElementById('license-input');
    const licenseError = document.getElementById('license-error');
    const licenseStatus = document.getElementById('license-status');
    document.getElementById('license-cancel').addEventListener('click', () => { licenseOverlay.classList.remove('active'); licenseError.style.display = 'none'; });
    licenseOverlay.addEventListener('click', (e) => { if (e.target === licenseOverlay) { licenseOverlay.classList.remove('active'); licenseError.style.display = 'none'; } });
    document.getElementById('license-btn').addEventListener('click', () => {
      licenseInput.value = '';
      licenseError.style.display = 'none';
      licenseStatus.style.display = 'none';
      if (licenseInfo) {
        licenseStatus.style.display = 'block';
        licenseStatus.style.background = 'var(--input-bg)';
        licenseStatus.style.border = '1px solid var(--border)';
        licenseStatus.innerHTML = `Active: <strong>${licenseInfo.type}</strong> &middot; <a href="#" onclick="clearLicense();licenseOverlay.classList.remove('active');return false" style="color:#e74c3c">Remove</a>`;
      }
      licenseOverlay.classList.add('active');
    });
    document.getElementById('license-submit').addEventListener('click', async () => {
      const key = licenseInput.value.trim().toUpperCase();
      if (!key) { licenseError.textContent = 'Please enter a license key'; licenseError.style.display = 'block'; return; }
      licenseError.style.display = 'none';
      try {
        const res = await fetch('/api/verify-license', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key })
        });
        const data = await res.json();
        if (data.valid) {
          saveLicense({ type: data.type, canDownload: data.canDownload });
          licenseStatus.style.display = 'block';
          licenseStatus.style.background = '#1a3a1a';
          licenseStatus.style.border = '1px solid #22c55e';
          licenseStatus.style.color = '#22c55e';
          licenseStatus.textContent = `✅ ${data.type.charAt(0).toUpperCase() + data.type.slice(1)} license verified!`;
          showToast('License activated: ' + data.type);
          setTimeout(() => { licenseOverlay.classList.remove('active'); }, 1500);
        } else {
          licenseError.textContent = data.error || 'Invalid key';
          licenseError.style.display = 'block';
        }
      } catch { licenseError.textContent = 'Connection error'; licenseError.style.display = 'block'; }
    });

    // MIDI player
    const playerOverlay = document.getElementById('player-overlay');
    const playerTitle = document.getElementById('player-title');
    const playerStatus = document.getElementById('player-status');
    let currentMidiFile = '';

    document.getElementById('player-close').addEventListener('click', stopMidiPlayer);
    playerOverlay.addEventListener('click', (e) => { if (e.target === playerOverlay) stopMidiPlayer(); });
    document.getElementById('player-play-btn').addEventListener('click', resumeMidiPlayer);
    document.getElementById('player-pause-btn').addEventListener('click', pauseMidiPlayer);
    document.getElementById('player-stop-btn').addEventListener('click', stopMidiPlayer);

    async function playMidi(filename) {
      currentMidiFile = filename;
      playerTitle.textContent = '▶ ' + cleanName(filename);
      playerStatus.textContent = 'Loading…';
      playerOverlay.classList.add('active');
      stopMidiPlayer();
      try {
        const res = await fetch('/api/download?name=' + encodeURIComponent(filename) + '&stream=1');
        if (!res.ok) { playerStatus.textContent = 'Failed to load file'; return; }
        const buffer = await res.arrayBuffer();
        const midi = new Tone.Midi(buffer);
        playerMidiData = midi;
        playerSynth = new Tone.PolySynth(Tone.Synth, { volume: -6 }).toDestination();
        playerStatus.textContent = 'Ready — press Play';
      } catch { playerStatus.textContent = 'Failed to load MIDI'; }
    }

    function resumeMidiPlayer() {
      if (!playerMidiData || !playerSynth) return;
      if (playerPart) { Tone.Transport.resume(); playerStatus.textContent = 'Playing…'; return; }
      Tone.start();
      const bpm = playerMidiData.header.tempos[0]?.bpm || 120;
      Tone.Transport.bpm.value = bpm;
      const allNotes = [];
      playerMidiData.tracks.forEach(track => {
        track.notes.forEach(n => {
          allNotes.push([n.time, { note: n.name, dur: n.duration }]);
        });
      });
      allNotes.sort((a, b) => a[0] - b[0]);
      playerPart = new Tone.Part((time, note) => {
        playerSynth.triggerAttackRelease(note.note, note.dur, time);
      }, allNotes);
      playerPart.start(0);
      Tone.Transport.start();
      playerStatus.textContent = 'Playing…';
    }

    function pauseMidiPlayer() {
      Tone.Transport.pause();
      if (playerStatus) playerStatus.textContent = 'Paused';
    }

    function stopMidiPlayer() {
      Tone.Transport.stop();
      Tone.Transport.cancel();
      if (playerPart) { playerPart.dispose(); playerPart = null; }
      if (playerSynth) { playerSynth.dispose(); playerSynth = null; }
      playerMidiData = null;
      playerStatus.textContent = 'Stopped';
      currentMidiFile = '';
      playerOverlay.classList.remove('active');
    }

    // Sheet popup
    const sheetOverlay = document.getElementById('sheet-overlay');
    const sheetTitle = document.getElementById('sheet-title');
    const sheetContent = document.getElementById('sheet-content');
    const sheetDlBtn = document.getElementById('sheet-dl-btn');
    document.getElementById('sheet-close').addEventListener('click', () => sheetOverlay.classList.remove('active'));
    sheetOverlay.addEventListener('click', (e) => { if (e.target === sheetOverlay) sheetOverlay.classList.remove('active'); });

    async function showSheet(filename) {
      sheetTitle.textContent = 'Sheets — ' + cleanName(filename);
      sheetContent.textContent = 'Loading…';
      sheetOverlay.classList.add('active');
      if (canDownload) {
        sheetDlBtn.style.display = '';
        sheetDlBtn.onclick = () => { const a = document.createElement('a'); a.href = '/api/download?name=' + encodeURIComponent(filename); a.download = filename; a.click(); };
      } else {
        sheetDlBtn.style.display = 'none';
      }
      try {
        const res = await fetch('/api/download?name=' + encodeURIComponent(filename) + '&stream=1');
        if (!res.ok) { sheetContent.textContent = 'Failed to load sheet.'; return; }
        sheetContent.textContent = await res.text();
      } catch { sheetContent.textContent = 'Failed to load sheet.'; }
    }

    // Report modal
    const reportOverlay = document.getElementById('report-overlay');
    const reportFilename = document.getElementById('report-filename');
    const reportReason = document.getElementById('report-reason');
    const reportComment = document.getElementById('report-comment');
    let reportTargetName = '';
    document.getElementById('report-close').addEventListener('click', closeReport);
    reportOverlay.addEventListener('click', (e) => { if (e.target === reportOverlay) closeReport(); });

    function closeReport() {
      reportOverlay.classList.remove('active');
      reportReason.value = '';
      reportComment.value = '';
    }

    function showReport(baseName) {
      reportTargetName = baseName;
      reportFilename.textContent = 'File: ' + baseName;
      reportOverlay.classList.add('active');
    }

    document.getElementById('report-submit').addEventListener('click', async () => {
      const reason = reportReason.value;
      if (!reason) { showToast('Please select a reason', 'error'); return; }
      try {
        const res = await fetch('/api/report', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename: reportTargetName, reason, comment: reportComment.value })
        });
        if (res.ok) { showToast('Report submitted'); closeReport(); }
        else { const e = await res.json(); showToast(e.error || 'Failed to submit', 'error'); }
      } catch { showToast('Failed to submit report', 'error'); }
    });

    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type + ' show';
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    Promise.all([loadConfig(), loadFiles()]);
  </script>
</body>
</html>
